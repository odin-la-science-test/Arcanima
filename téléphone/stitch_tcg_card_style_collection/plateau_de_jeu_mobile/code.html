<script>
        function castSpell() {
            const feedback = document.getElementById('combat-feedback');
            const text = document.getElementById('combat-text');
            const hpBar = document.getElementById('enemy-hp-bar');
            
            // Damage simulation
            feedback.style.opacity = '1';
            text.style.transform = 'scale(1.5)';
            
            // Update HP Bar
            const currentHeight = parseInt(hpBar.style.height || '50');
            const newHeight = Math.max(0, currentHeight - 15);
            hpBar.style.height = newHeight + '%';

            // Animation out
            setTimeout(() => {
                feedback.style.opacity = '0';
                text.style.transform = 'scale(0)';
            }, 1000);
        }

        // Initialize Material Symbols
        document.querySelectorAll('[data-icon]').forEach(el => {
            const iconName = el.getAttribute('data-icon');
            const span = document.createElement('span');
            span.className = 'material-symbols-outlined';
            span.textContent = iconName;
            if (el.getAttribute('data-weight') === 'fill') {
                span.style.fontVariationSettings = "'FILL' 1";
            }
            // If the element already has the class, we replace content, otherwise we append
            if (el.classList.contains('material-symbols-outlined')) {
                el.textContent = iconName;
            }
        });
    </script>
