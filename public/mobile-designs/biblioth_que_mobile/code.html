<script>
        // Simple micro-interaction for chips
        document.querySelectorAll('button.rounded-full').forEach(chip => {
            chip.addEventListener('click', () => {
                if (!chip.classList.contains('bg-primary-container/20')) {
                    chip.classList.add('bg-primary-container/20', 'border-primary', 'text-primary');
                    chip.classList.remove('border-outline-variant', 'text-on-surface-variant');
                } else {
                    chip.classList.remove('bg-primary-container/20', 'border-primary', 'text-primary');
                    chip.classList.add('border-outline-variant', 'text-on-surface-variant');
                }
            });
        });

        // Atmospheric mana pulse effect on card click
        document.querySelectorAll('.card-glow').forEach(card => {
            card.addEventListener('mousedown', function() {
                this.style.transform = 'scale(0.98)';
                this.style.filter = 'brightness(1.1)';
            });
            card.addEventListener('mouseup', function() {
                this.style.transform = 'scale(1)';
                this.style.filter = 'brightness(1)';
            });
        });
    </script>
